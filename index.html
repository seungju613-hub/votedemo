<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>보라보트 — 투표 루프 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-1:#160a2b;
    --ink-2:#241043;
    --ink-3:#2e1556;
    --surface:rgba(255,255,255,0.05);
    --surface-strong:rgba(255,255,255,0.09);
    --line:rgba(255,255,255,0.10);
    --txt:#f4eefe;
    --txt-mute:#b3a3d6;
    --grad:linear-gradient(135deg,#a855f7 0%,#ec4899 100%);
    --grad-soft:linear-gradient(135deg,rgba(168,85,247,.22),rgba(236,72,153,.22));
    --gold:#fcd34d;
    --gold-deep:#f59e0b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans KR',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #3a1a6b 0%, transparent 60%),
      linear-gradient(180deg,var(--ink-1),#0d0519);
    min-height:100vh;
    display:flex;justify-content:center;align-items:flex-start;
    padding:24px 12px 48px;color:var(--txt);
  }
  /* phone frame */
  .phone{
    width:100%;max-width:392px;
    background:linear-gradient(180deg,var(--ink-2),var(--ink-1));
    border:1px solid var(--line);
    border-radius:34px;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06);
    overflow:hidden;position:relative;
  }
  .notch{height:26px;display:flex;justify-content:center;align-items:flex-start;padding-top:9px;}
  .notch::before{content:"";width:96px;height:5px;border-radius:99px;background:rgba(255,255,255,.18);}

  /* header */
  header{padding:8px 20px 16px;}
  .eyebrow{font-size:11px;letter-spacing:.18em;color:var(--txt-mute);font-weight:700;text-transform:uppercase;}
  .brand{display:flex;align-items:baseline;gap:8px;margin-top:2px;}
  .logo{
    font-family:'Black Han Sans',sans-serif;font-size:30px;line-height:1;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .logo-tag{font-size:11px;color:var(--txt-mute);font-weight:500;}

  /* balance pill */
  .balance-row{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .balance{
    flex:1;display:flex;align-items:center;gap:10px;
    background:var(--surface-strong);border:1px solid var(--line);
    border-radius:16px;padding:12px 14px;
  }
  .balance .coin{font-size:20px;}
  .balance .lbl{font-size:11px;color:var(--txt-mute);font-weight:600;}
  .balance .val{font-family:'Black Han Sans',sans-serif;font-size:22px;line-height:1;margin-top:1px;}
  .balance .val small{font-size:12px;font-family:'Noto Sans KR';color:var(--txt-mute);font-weight:700;margin-left:2px;}
  .balance.bump{animation:bump .5s cubic-bezier(.2,.8,.2,1);}
  .balance.lack{animation:shake .45s;}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

  .ad-btn{
    border:none;cursor:pointer;border-radius:16px;padding:13px 16px;
    background:var(--grad);color:#fff;font-family:'Noto Sans KR';font-weight:800;font-size:14px;
    box-shadow:0 10px 24px -8px rgba(236,72,153,.6);white-space:nowrap;
    transition:transform .12s ease, box-shadow .2s ease;
  }
  .ad-btn:active{transform:translateY(1px) scale(.98);}
  .ad-btn.pulse{animation:adpulse 1.1s ease infinite;}
  @keyframes adpulse{0%,100%{box-shadow:0 10px 24px -8px rgba(236,72,153,.6)}50%{box-shadow:0 10px 30px -4px rgba(236,72,153,.95)}}

  /* section title */
  .sec-title{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 8px;}
  .sec-title h2{margin:0;font-size:15px;font-weight:800;}
  .sec-title .hint{font-size:11px;color:var(--txt-mute);}

  /* list */
  .list{padding:4px 12px 8px;display:flex;flex-direction:column;}
  .row{
    display:flex;align-items:center;gap:12px;
    padding:11px 10px;border-radius:18px;border:1px solid transparent;
    will-change:transform;
  }
  .row + .row{margin-top:4px;}
  .rank{
    width:26px;text-align:center;flex:none;
    font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--txt-mute);
  }
  .avatar{
    width:46px;height:46px;border-radius:14px;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-family:'Black Han Sans',sans-serif;font-size:18px;color:#fff;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .who{flex:1;min-width:0;}
  .who .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .who .gp{font-size:11px;color:var(--txt-mute);margin-top:1px;}
  .votes{flex:none;text-align:right;margin-right:2px;}
  .votes .n{font-family:'Black Han Sans',sans-serif;font-size:16px;line-height:1;}
  .votes .u{font-size:10px;color:var(--txt-mute);}
  .votes .n.tick{animation:tick .45s cubic-bezier(.2,.8,.2,1);}
  @keyframes tick{0%{transform:scale(1);color:var(--gold)}40%{transform:scale(1.35);color:var(--gold)}100%{transform:scale(1)}}
  .vote-btn{
    flex:none;border:1px solid var(--line);background:var(--surface-strong);
    color:var(--txt);border-radius:12px;padding:9px 13px;font-family:'Noto Sans KR';
    font-weight:800;font-size:12px;cursor:pointer;transition:transform .1s, background .2s;
  }
  .vote-btn:active{transform:scale(.94);}
  .vote-btn .c{display:block;font-size:9px;color:var(--txt-mute);font-weight:600;margin-top:1px;}

  /* #1 highlight */
  .row.top{
    background:var(--grad-soft);
    border-color:rgba(252,211,77,.4);
    box-shadow:0 0 0 1px rgba(252,211,77,.15), 0 12px 30px -14px rgba(236,72,153,.7);
  }
  .row.top .rank{color:var(--gold);}
  .row.top .crown{display:inline-block;}
  .crown{display:none;font-size:13px;margin-left:2px;}
  .prize-tag{
    display:none;margin:2px 12px 10px;padding:9px 12px;border-radius:12px;
    background:rgba(252,211,77,.10);border:1px dashed rgba(252,211,77,.45);
    font-size:11.5px;color:#fde9a9;font-weight:600;line-height:1.4;
  }
  .prize-tag b{color:var(--gold);}

  /* loop footer */
  .loop{
    margin:6px 16px 18px;padding:12px;border-radius:16px;
    background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;
    font-size:11px;color:var(--txt-mute);font-weight:600;
  }
  .loop .step{color:var(--txt);} .loop .ar{opacity:.5;}

  /* ad modal */
  .scrim{
    position:absolute;inset:0;background:rgba(8,3,18,.78);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:28px;z-index:20;
  }
  .scrim.show{display:flex;}
  .ad-card{
    width:100%;background:linear-gradient(180deg,#2c1656,#1c0d38);
    border:1px solid var(--line);border-radius:22px;padding:22px;text-align:center;
  }
  .ad-card .tv{font-size:34px;}
  .ad-card h3{margin:8px 0 2px;font-size:16px;}
  .ad-card p{margin:0;font-size:12px;color:var(--txt-mute);}
  .ad-prog{height:8px;border-radius:99px;background:rgba(255,255,255,.12);margin:18px 0 6px;overflow:hidden;}
  .ad-prog>i{display:block;height:100%;width:0;background:var(--grad);border-radius:99px;}
  .ad-count{font-family:'Black Han Sans';font-size:13px;color:var(--txt-mute);}
  .ad-done{
    background:var(--grad);border:none;color:#fff;font-family:'Noto Sans KR';font-weight:800;
    border-radius:14px;padding:12px 18px;font-size:14px;margin-top:14px;cursor:pointer;display:none;
  }

  /* toast */
  .toast{
    position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:#fff;color:#2d1156;font-weight:800;font-size:13px;
    padding:11px 18px;border-radius:99px;box-shadow:0 16px 30px -10px rgba(0,0,0,.6);
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:30;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>

    <header>
      <div class="eyebrow">오늘의 최애 투표</div>
      <div class="brand">
        <span class="logo">보라보트</span>
        <span class="logo-tag">BORAVOTE · 데모</span>
      </div>

      <div class="balance-row">
        <div class="balance" id="balance">
          <span class="coin">💜</span>
          <div>
            <div class="lbl">내 보라</div>
            <div class="val"><span id="balVal">0</span><small>보라</small></div>
          </div>
        </div>
        <button class="ad-btn pulse" id="adBtn">광고 보고<br>보라 받기</button>
      </div>
    </header>

    <div class="sec-title">
      <h2>실시간 순위</h2>
      <span class="hint">1표 = 10보라</span>
    </div>

    <div class="prize-tag" id="prizeTag"></div>
    <div class="list" id="list"></div>

    <div class="loop">
      <span class="step">광고/충전</span><span class="ar">→</span>
      <span class="step">보라</span><span class="ar">→</span>
      <span class="step">투표</span><span class="ar">→</span>
      <span class="step">1위</span><span class="ar">→</span>
      <span class="step">상 🎁</span>
    </div>

    <!-- ad modal -->
    <div class="scrim" id="scrim">
      <div class="ad-card">
        <div class="tv">📺</div>
        <h3 id="adTitle">광고 시청 중…</h3>
        <p id="adSub">끝까지 보면 보라가 적립돼요</p>
        <div class="ad-prog"><i id="adFill"></i></div>
        <div class="ad-count" id="adCount">3초</div>
        <button class="ad-done" id="adDone">+30 보라 받기</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
(function(){
  "use strict";
  const VOTE_COST = 10;
  const AD_REWARD = 30;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // --- sample data (전부 가상의 예시 — 나중에 실제 가수로 교체) ---
  let idols = [
    {id:'a', nm:'한도윤', gp:'LUNARIS', votes:2840, c:['#a855f7','#6366f1']},
    {id:'b', nm:'서지안', gp:'STELLAR', votes:2610, c:['#ec4899','#f472b6']},
    {id:'c', nm:'박시우', gp:'AURORA', votes:2390, c:['#06b6d4','#3b82f6']},
    {id:'d', nm:'정태오', gp:'LUNARIS', votes:1980, c:['#f59e0b','#ef4444']},
    {id:'e', nm:'김하늘', gp:'STELLAR', votes:1750, c:['#10b981','#14b8a6']},
    {id:'f', nm:'최리안', gp:'AURORA', votes:1520, c:['#8b5cf6','#ec4899']},
  ];
  let balance = 0;

  const $ = s=>document.querySelector(s);
  const listEl = $('#list'), balValEl = $('#balVal'), balanceEl = $('#balance');
  const prizeTag = $('#prizeTag'), toastEl = $('#toast');
  const rowEls = new Map();

  function initial(n){ return (n||'?').trim().charAt(0); }

  // build rows once
  function build(){
    idols.forEach(d=>{
      const row = document.createElement('div');
      row.className = 'row'; row.dataset.id = d.id;
      row.innerHTML = `
        <div class="rank"></div>
        <div class="avatar" style="background:linear-gradient(135deg,${d.c[0]},${d.c[1]})">${initial(d.nm)}</div>
        <div class="who">
          <div class="nm">${d.nm}<span class="crown">👑</span></div>
          <div class="gp">${d.gp}</div>
        </div>
        <div class="votes"><span class="n">${d.votes.toLocaleString()}</span> <span class="u">표</span></div>
        <button class="vote-btn">투표<span class="c">10보라</span></button>`;
      row.querySelector('.vote-btn').addEventListener('click', ()=>vote(d.id));
      listEl.appendChild(row);
      rowEls.set(d.id, row);
    });
    reorder(true);
    renderBalance();
  }

  function renderBalance(){ balValEl.textContent = balance.toLocaleString(); }

  // FLIP reorder + rank/highlight update
  function reorder(instant){
    const firsts = new Map();
    if(!instant && !reduce) rowEls.forEach((el,id)=>firsts.set(id, el.getBoundingClientRect().top));

    const sorted = [...idols].sort((x,y)=>y.votes - x.votes);
    sorted.forEach(d=>listEl.appendChild(rowEls.get(d.id))); // reorder DOM

    // rank numbers + top highlight
    sorted.forEach((d,i)=>{
      const el = rowEls.get(d.id);
      el.querySelector('.rank').textContent = i+1;
      el.classList.toggle('top', i===0);
    });
    const leader = sorted[0];
    prizeTag.style.display = 'block';
    prizeTag.innerHTML = `🎁 현재 1위 <b>${leader.nm}</b> · 이대로 마감되면 <b>생일 전광판 광고</b> 주인공!`;

    if(instant || reduce) return;
    rowEls.forEach((el,id)=>{
      const dy = (firsts.get(id) || 0) - el.getBoundingClientRect().top;
      if(!dy) return;
      el.style.transform = `translateY(${dy}px)`;
      el.style.transition = 'none';
      requestAnimationFrame(()=>{
        el.style.transition = 'transform .42s cubic-bezier(.2,.8,.2,1)';
        el.style.transform = '';
      });
    });
  }

  function vote(id){
    if(balance < VOTE_COST){
      balanceEl.classList.remove('lack'); void balanceEl.offsetWidth;
      balanceEl.classList.add('lack');
      $('#adBtn').classList.add('pulse');
      toast('보라가 부족해요 — 광고를 보고 모아보세요!');
      return;
    }
    balance -= VOTE_COST; renderBalance();
    const d = idols.find(x=>x.id===id); d.votes += 1;
    const numEl = rowEls.get(id).querySelector('.votes .n');
    numEl.textContent = d.votes.toLocaleString();
    numEl.classList.remove('tick'); void numEl.offsetWidth; numEl.classList.add('tick');
    reorder(false);
  }

  // --- ad simulation ---
  const scrim=$('#scrim'), adFill=$('#adFill'), adCount=$('#adCount'),
        adDone=$('#adDone'), adTitle=$('#adTitle'), adSub=$('#adSub');
  let adTimer=null;

  $('#adBtn').addEventListener('click', openAd);
  adDone.addEventListener('click', finishAd);

  function openAd(){
    scrim.classList.add('show');
    adTitle.textContent='광고 시청 중…'; adSub.textContent='끝까지 보면 보라가 적립돼요';
    adDone.style.display='none'; adFill.style.width='0%';
    const total = reduce ? 300 : 3000; const start = performance.now();
    cancelAnimationFrame(adTimer);
    function frame(now){
      const p = Math.min(1,(now-start)/total);
      adFill.style.width=(p*100)+'%';
      adCount.textContent = Math.ceil((1-p)*(total/1000))+'초';
      if(p<1){ adTimer=requestAnimationFrame(frame); }
      else{ adTitle.textContent='시청 완료!'; adSub.textContent='보라를 받아가세요'; adCount.textContent='0초'; adDone.style.display='inline-block'; }
    }
    adTimer=requestAnimationFrame(frame);
  }
  function finishAd(){
    scrim.classList.remove('show');
    balance += AD_REWARD; renderBalance();
    balanceEl.classList.remove('bump'); void balanceEl.offsetWidth; balanceEl.classList.add('bump');
    $('#adBtn').classList.remove('pulse');
    toast('💜 +'+AD_REWARD+' 보라 적립!');
  }

  let toastT=null;
  function toast(msg){
    toastEl.textContent=msg; toastEl.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove('show'),1900);
  }

  build();
})();
</script>
</body>
</html>
